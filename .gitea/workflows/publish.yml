name: Deploy to S3

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build web bundle
        shell: bash
        run: |
          node -v && npm -v
          npm install
          npm test
          npm run build

      - name: Deploy to Garage S3
        uses: http://gitea:3000/actions/publish-s3site@main
        with:
          infisical-client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          infisical-client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          infisical-project-id: ${{ secrets.INFISICAL_PROJECT_ID }}
          infisical-path: /games
          s3-bucket: games
          s3-path: /sullytear
          source-dir: ./dist
