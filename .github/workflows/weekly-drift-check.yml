name: Weekly Drift Check

on:
  schedule:
    - cron: '0 8 * * 1'  # Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  drift-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run sim compare
        id: compare
        run: |
          npm run sim:compare 2>&1 | tee /tmp/sim-compare.log
        continue-on-error: true

      - name: Open issue on drift
        if: steps.compare.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SIM_OUTPUT=$(cat /tmp/sim-compare.log)

          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "⚠️ Weekly drift check failed — $(date +%Y-%m-%d)" \
            --label "balance,drift" \
            --body "$(cat <<EOF
          The weekly sim compare against the committed baseline failed.

          This means headline metrics have drifted from \`sim/baseline.json\` without
          a corresponding baseline update in a balance PR.

          ### Sim compare output
          \`\`\`
          $SIM_OUTPUT
          \`\`\`

          ### Next steps
          1. Run \`npm run sim:compare\` locally to reproduce.
          2. If the drift is expected, regenerate the baseline: \`npm run sim:baseline\`
          3. Commit the updated baseline in a balance PR with human review.

          ---
          🤖 Generated by the weekly drift check
          EOF
          )"
