# art/goblin.model.toml
#
# Port of src/combat/arena/models/GoblinModel.tsx.
# 
# Contract: feet at y=0, height in [0.3, 4.0], animations named
# idle/attack/hit/death exactly. See art/README.md.

name = "goblin"
description = """
Small, nimble green lapped-up creature. Wields a jagged dagger.
"""

# -- Skeleton ----------------------------------------------------------------
[[bones]]
name = "root"
head = [0.0, 0.0, 0.0]

# -- Geometry ----------------------------------------------------------------
# Body: capsule radius 0.3, height 0.5, center at y=0.6
[[parts]]
shape  = "capsule"
radius = 0.3
height = 0.5
pos    = [0.0, 0.6, 0.0]
color  = "#5a8a3a"
bone   = "root"

# Head: sphere radius 0.3, center at y=1.3
[[parts]]
shape  = "sphere"
radius = 0.3
pos    = [0.0, 1.3, 0.0]
color  = "#5a8a3a"
bone   = "root"

# Left ear: cone radius 0.08, height 0.35, pos [-0.35, 1.5, 0], rot [0, 0, -0.5]
[[parts]]
shape  = "cone"
radius = 0.08
height = 0.35
pos    = [-0.35, 1.5, 0.0]
rot    = [0.0, 0.0, -0.5]
color  = "#5a8a3a"
bone   = "root"

# Right ear: cone radius 0.08, height 0.35, pos [0.35, 1.5, 0], rot [0, 0, 0.5]
[[parts]]
shape  = "cone"
radius = 0.08
height = 0.35
pos    = [0.35, 1.5, 0.0]
rot    = [0.0, 0.0, 0.5]
color  = "#5a8a3a"
bone   = "root"

# Eyes: sphere radius 0.06, pos [+/-0.1, 1.35, 0.25]
[[parts]]
shape  = "sphere"
radius = 0.06
pos    = [-0.1, 1.35, 0.25]
color  = "#FFD700"
bone   = "root"

[[parts]]
shape  = "sphere"
radius = 0.06
pos    = [0.1, 1.35, 0.25]
color  = "#FFD700"
bone   = "root"

# Nose: sphere radius 0.05, pos [0, 1.25, 0.28]
[[parts]]
shape  = "sphere"
radius = 0.05
pos    = [0.0, 1.25, 0.28]
color  = "#3d6b24"
bone   = "root"

# Left arm: capsule radius 0.07, height 0.35, pos [-0.4, 0.7, 0], rot [0, 0, -0.4]
[[parts]]
shape  = "capsule"
radius = 0.07
height = 0.35
pos    = [-0.4, 0.7, 0.0]
rot    = [0.0, 0.0, -0.4]
color  = "#5a8a3a"
bone   = "root"

# Right arm: capsule radius 0.07, height 0.35, pos [0.4, 0.75, 0], rot [0, 0, 0.3]
[[parts]]
shape  = "capsule"
radius = 0.07
height = 0.35
pos    = [0.4, 0.75, 0.0]
rot    = [0.0, 0.0, 0.3]
color  = "#5a8a3a"
bone   = "root"

# Dagger blade: cone radius 0.03, height 0.3, pos [0.45, 1.1, 0], rot [0, 0, 0.2]
# Note: original dagger was in a group offset from arm. Adjusted to global.
[[parts]]
shape  = "cone"
radius = 0.03
height = 0.3
pos    = [0.45, 1.1, 0.0]
rot    = [0.0, 0.0, 0.2]
color  = "#cccccc"
bone   = "root"

# Legs: capsule radius 0.08, height 0.3, pos [+/-0.12, 0.15, 0]
[[parts]]
shape  = "capsule"
radius = 0.08
height = 0.3
pos    = [-0.12, 0.15, 0.0]
color  = "#3d6b24"
bone   = "root"

[[parts]]
shape  = "capsule"
radius = 0.08
height = 0.3
pos    = [0.12, 0.15, 0.0]
color  = "#3d6b24"
bone   = "root"

# -- Animations --------------------------------------------------------------
[animations.idle]
loop = true
duration = 2.0
[[animations.idle.tracks]]
