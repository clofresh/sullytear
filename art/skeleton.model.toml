# art/skeleton.model.toml
#
# Port of src/combat/arena/models/SkeletonModel.tsx.
# 
# Contract: feet at y=0, height in [0.3, 4.0], animations named
# idle/attack/hit/death exactly. See art/README.md.

name = "skeleton"
description = """
Rattling bones and a rusted sword. Relentless and cold.
"""

# -- Skeleton ----------------------------------------------------------------
[[bones]]
name = "root"
head = [0.0, 0.0, 0.0]

# -- Geometry ----------------------------------------------------------------
# Skull: sphere radius 0.25, pos [0, 1.35, 0]
[[parts]]
shape  = "sphere"
radius = 0.25
pos    = [0.0, 1.35, 0.0]
color  = "#e8e0d0"
bone   = "root"

# Eyes: sphere radius 0.06, pos [+/-0.08, 1.4, 0.2]
[[parts]]
shape  = "sphere"
radius = 0.06
pos    = [-0.08, 1.4, 0.2]
color  = "#ff3333"
bone   = "root"

[[parts]]
