radius = 0.4
height = 0.6
pos    = [0.0, 0.3, 0.0]
color  = "#8B2500"
bone   = "root"

# Belly plate: capsule radius 0.25, height 0.3, pos [0, 0.65, 0.3]
[[parts]]
