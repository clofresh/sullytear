# art/slime.model.toml
#
# Port of src/combat/arena/models/SlimeModel.tsx.
# Single-bone rig (root); all parts weighted 100% to root. Animations are
# authored as TRS tracks on the root joint so the skin follows.
#
# Contract: feet at y=0, height in [0.3, 4.0], animations named
# idle/attack/hit/death exactly. See art/README.md.

name = "slime"
description = """
Friendly green blob. Breathes and bounces on idle, lunges on attack,
flinches on hit, flattens into a puddle on death.
"""

# -- Skeleton ----------------------------------------------------------------
# Single bone at origin. Inverse bind is identity.
[[bones]]
name = "root"
head = [0.0, 0.0, 0.0]

# -- Geometry ----------------------------------------------------------------
# Body: sphere radius 0.7, centered at y=0.7 so feet touch y=0.
# Total height ~1.4.
[[parts]]
shape  = "sphere"
radius = 0.7
pos    = [0.0, 0.7, 0.0]
color  = "#44cc44"
bone   = "root"

# Left eye white
[[parts]]
shape  = "sphere"
radius = 0.12
pos    = [-0.2, 0.95, 0.55]
color  = "#ffffff"
bone   = "root"

# Left pupil
[[parts]]
shape  = "sphere"
radius = 0.06
pos    = [-0.2, 0.95, 0.63]
color  = "#111111"
bone   = "root"

# Right eye white
[[parts]]
shape  = "sphere"
radius = 0.12
pos    = [0.2, 0.95, 0.55]
color  = "#ffffff"
bone   = "root"

# Right pupil
[[parts]]
shape  = "sphere"
radius = 0.06
pos    = [0.2, 0.95, 0.63]
color  = "#111111"
bone   = "root"

# -- Animations --------------------------------------------------------------
# All channels target the "root" bone. Translation is in metres, rotation is
# a quaternion [x, y, z, w], scale is a per-axis multiplier.

[animations.idle]
loop = true
duration = 2.0

# Breathing squash/stretch on the root joint. Matches the sinusoidal
# bodyRef.scale.set(1+breathe, 1-breathe*0.6, 1+breathe) from the TSX source.
[[animations.idle.tracks]]
bone = "root"
path = "scale"
times  = [0.0, 0.5, 1.0, 1.5, 2.0]
values = [
  [1.00, 1.000, 1.00],
  [1.08, 0.952, 1.08],  # inhale
  [1.00, 1.000, 1.00],
  [0.92, 1.048, 0.92],  # exhale
  [1.00, 1.000, 1.00],  # loop
]

# Gentle bounce.
[[animations.idle.tracks]]
bone = "root"
path = "translation"
times  = [0.0, 0.5, 1.0, 1.5, 2.0]
values = [
  [0.0, 0.00, 0.0],
  [0.0, 0.08, 0.0],
  [0.0, 0.00, 0.0],
  [0.0, 0.08, 0.0],
  [0.0, 0.00, 0.0],
]

[animations.attack]
loop = false
duration = 0.6

# Wind-up back, lunge forward (+Z), recover.
[[animations.attack.tracks]]
bone = "root"
path = "translation"
times  = [0.0, 0.15, 0.3, 0.6]
values = [
  [0.0, 0.0,  0.00],
  [0.0, 0.1, -0.15],  # wind-up
  [0.0, 0.0,  0.30],  # impact
  [0.0, 0.0,  0.00],  # recover
]

# Slight squash on impact.
[[animations.attack.tracks]]
bone = "root"
path = "scale"
times  = [0.0, 0.3, 0.6]
values = [
  [1.00, 1.00, 1.00],
  [1.15, 0.85, 1.15],
  [1.00, 1.00, 1.00],
]

[animations.hit]
loop = false
duration = 0.3

# Horizontal shake.
[[animations.hit.tracks]]
bone = "root"
path = "translation"
times  = [0.0, 0.06, 0.12, 0.18, 0.24, 0.3]
values = [
  [ 0.00, 0.0, 0.0],
  [ 0.12, 0.0, 0.0],
  [-0.10, 0.0, 0.0],
  [ 0.08, 0.0, 0.0],
  [-0.04, 0.0, 0.0],
  [ 0.00, 0.0, 0.0],
]

[animations.death]
loop = false
duration = 1.2

# Collapse into a puddle. Scaling the root joint's Y toward 0 flattens the
# mesh toward the floor; because the node origin is at the feet, minY stays
# at 0.
[[animations.death.tracks]]
bone = "root"
path = "scale"
times  = [0.0, 0.3, 1.2]
values = [
  [1.0, 1.0, 1.0],
  [1.3, 0.7, 1.3],  # squish
  [1.6, 0.15, 1.6], # puddle
]
