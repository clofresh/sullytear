radius = 0.25
height = 0.3
pos    = [0.0, 0.65, 0.3]
color  = "#cc6633"
bone   = "root"

# Neck: capsule radius 0.15, height 0.3, pos [0, 0.8, 0.15], rot [0.3, 0, 0]
