path = "scale"
times  = [0.0, 0.5, 1.0, 1.5, 2.0]
values = [
  [1.00, 1.00, 1.00],
  [1.03, 0.97, 1.03],
  [1.00, 1.00, 1.00],
  [0.97, 1.03, 0.97],
  [1.00, 1.00, 1.00],
]

[[animations.idle.tracks]]
bone = "root"
