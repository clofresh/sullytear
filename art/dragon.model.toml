# art/dragon.model.toml
#
# Port of src/combat/arena/models/DragonModel.tsx.
# 
# Contract: feet at y=0, height in [0.3, 4.0], animations named
# idle/attack/hit/death exactly. See art/README.md.

name = "dragon"
description = """
A monolithic red drake. Breathes fire and dominates the skyline.
"""

